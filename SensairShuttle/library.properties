sentence=Board support library for the Espressif ESP-SensairShuttle (ESP32-C5) development kit.
paragraph=Modular drivers for the 1.83" ST7789P3 SPI display, CST816S touch panel, and the Bosch Sensortec shuttle boards: BME690 environmental sensor, BMI270 IMU and BMM350 magnetometer (via the BMI270 auxiliary interface). Bundles the official Bosch SensorAPI drivers. One example per module.
